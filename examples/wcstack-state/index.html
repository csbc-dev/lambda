<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>@wcstack/state Lambda Example</title>
    <link rel="stylesheet" href="../shared/demo.css">
    <!--
      Remote-first, fully declarative wiring. The two scripts below only
      register custom elements as a side effect:
        1. @csbc-dev/lambda/auto — defines <lambda-invoke> / <lambda-stream>.
           After npm publish this is https://esm.run/@csbc-dev/lambda/auto;
           pre-publish we load the local ../../src/auto/auto.js, which imports
           the workspace ../../dist build. The example server serves both
           /src/auto/ and /dist/ so they resolve same-origin.
        2. @wcstack/state/auto — defines <wcs-state> and applies data-wcs.
      Lambda is loaded first so its elements are defined before @wcstack/state
      wires the DOM. No provider objects, no global helpers, no element
      lookups — everything else is `data-wcs` bindings (see below).

      Mirrors the ai-agent (local) and auth0 (remote) @wcstack/state examples:
      state owns plain values + getters + command emits; the element owns the
      async invocation. AWS credentials never reach the browser — attr.remote-url
      points <lambda-invoke> at a server-owned Core (examples/server).
    -->
    <script type="module" src="../../src/auto/auto.js"></script>
    <script type="module" src="https://esm.run/@wcstack/state@1.10.0/auto"></script>
  </head>
  <body>
    <main class="shell">
      <header class="masthead">
        <div>
          <p class="eyebrow">@wcstack/state</p>
          <h1>Declarative remote Lambda invoke</h1>
          <p class="summary">Inputs and command tokens are bound straight onto <code>&lt;lambda-invoke&gt;</code> with <code>data-wcs</code>. <code>attr.remote-url</code> attaches the remote Core, so there is no <code>querySelector</code>, no <code>setProvider</code>, and no framework glue.</p>
        </div>
        <span class="badge">data-wcs + wc-bindable</span>
      </header>

      <wcs-state>
        <script type="module">
          export default {
            // Command tokens. @wcstack/state installs forwarders on
            // <lambda-invoke>'s declared commands (invoke / abort / reset);
            // the `command.<name>:` bindings below subscribe each forwarder
            // to its token, so emitting a token fires the command on the
            // element. No element reference is needed — state and element are
            // decoupled by the token.
            $commandTokens: ["invokeLambda", "abortLambda", "resetLambda"],

            // Inputs pushed onto <lambda-invoke>.
            functionName: "demo-function",
            mode: "buffered",
            // Remote Core endpoint. Bound via `attr.remote-url`, which makes
            // the element attach a LambdaRemoteProvider for this URL. Editing
            // the field re-attaches declaratively — still no imperative call.
            // Same-origin /api/lambda is served by examples/server, whose
            // server-side Core owns the provider (and, in production, the AWS
            // credentials).
            remoteUrl: "/api/lambda",
            payloadText: '{"name":"Ada","task":"wcstack-state example"}',

            // Outputs mirrored back: buffered/meta from <lambda-invoke>,
            // streaming projection from the <lambda-stream> child.
            invoking: false,
            streaming: false,
            result: null,
            error: null,
            requestId: null,
            duration: null,
            text: "",
            streamError: null,

            get parsedPayload() {
              const value = this.payloadText.trim();
              if (!value) return null;
              try {
                return JSON.parse(value);
              } catch {
                return value;
              }
            },
            get resultText() {
              return this.result === null ? "null" : JSON.stringify(this.result, null, 2);
            },
            get errorText() {
              // Both `error` (buffered/meta) and `streamError` (stream) are
              // normalized { code, message } shapes from LambdaCore, so the
              // one getter renders either symmetrically.
              const error = this.error || this.streamError;
              return error ? `${error.code}: ${error.message}` : "no error";
            },
            get statusText() {
              return this.invoking ? "invoking" : this.streaming ? "streaming" : "ready";
            },
            get durationText() {
              return this.duration === null ? "-" : `${Math.round(this.duration)}ms`;
            },

            // Command handlers emit a token and nothing else. Provider wiring
            // is declarative (attr.remote-url), so these never configure
            // transport or touch the element.
            invoke() { this.$command.invokeLambda.emit(); },
            abort() { this.$command.abortLambda.emit(); },
            reset() { this.$command.resetLambda.emit(); },
          };
        </script>
      </wcs-state>

      <section class="workspace">
        <section class="panel controls">
          <label>Function name <input data-wcs="value: functionName"></label>
          <div class="row">
            <label>Mode
              <select data-wcs="value: mode">
                <option value="buffered">buffered</option>
                <option value="stream">stream</option>
              </select>
            </label>
            <label>Remote endpoint <input data-wcs="value: remoteUrl"></label>
          </div>
          <label>Payload <textarea data-wcs="value: payloadText"></textarea></label>
          <div class="actions">
            <button type="button" data-wcs="onclick: invoke; disabled: invoking">Invoke</button>
            <button class="secondary" type="button" data-wcs="onclick: abort">Abort</button>
            <button class="secondary" type="button" data-wcs="onclick: reset">Reset</button>
          </div>
        </section>

        <section class="panel">
          <div class="stats">
            <div class="stat"><span>Status</span><strong data-wcs="textContent: statusText"></strong></div>
            <div class="stat"><span>Request</span><strong data-wcs="textContent: requestId|defaults(-)"></strong></div>
            <div class="stat"><span>Duration</span><strong data-wcs="textContent: durationText"></strong></div>
          </div>
          <div class="output-grid">
            <pre data-wcs="textContent: resultText"></pre>
            <pre data-wcs="textContent: text|defaults(stream text will appear here)"></pre>
            <pre class="error" data-wcs="textContent: errorText"></pre>
          </div>
        </section>
      </section>

      <!--
        Headless I/O node. Inputs and commands live on the parent
        <lambda-invoke>; the <lambda-stream> child is a projection shell that
        mirrors the parent's stream output, so its `streaming` / `text` /
        `streamError` are bound from the child element directly.
      -->
      <lambda-invoke id="wcs-lambda" data-wcs="
        functionName:    functionName;
        mode:            mode;
        payload:         parsedPayload;
        attr.remote-url: remoteUrl;
        invoking:        invoking;
        result:          result;
        error:           error;
        requestId:       requestId;
        duration:        duration;
        command.invoke:  $command.invokeLambda;
        command.abort:   $command.abortLambda;
        command.reset:   $command.resetLambda
      ">
        <lambda-stream data-wcs="
          streaming:   streaming;
          text:        text;
          streamError: streamError
        "></lambda-stream>
      </lambda-invoke>
    </main>
  </body>
</html>
